spring.application.name=apigateway
server.port=8080

# Eureka Config
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.instance.prefer-ip-address=true

# Actuator
management.endpoints.web.exposure.include=*
eureka.client.healthcheck.enabled=true



spring.cloud.gateway.server.webflux.routes[0].id=micro-server-categorias
spring.cloud.gateway.server.webflux.routes[0].uri=lb://categorias
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/categorias/**


spring.cloud.gateway.server.webflux.routes[1].id=micro-server-productos
spring.cloud.gateway.server.webflux.routes[1].uri=lb://productos
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/productos/**
